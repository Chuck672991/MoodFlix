name: CI/CD Pipeline

on:
  push:
    branches: [main]      # Change to 'master' if needed
  pull_request:           # ← Added
    branches: [main]      # ← Added

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'    # ← Added (caching)
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'    # ← Added
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest    # ← Removed 'needs' (3 parallel jobs)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'    # ← Added
      - run: npm ci
      - run: npm run build

  deploy:
    name: Deploy to EC2
    needs: [lint, test, build]    # Deploy waits for all 3
    runs-on: ubuntu-latest
    if: github.event_name == 'push'    # ← Only on push, not PR
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/movie-picker
            git pull origin main
            npm install
            npm run build
            pm2 restart movie-picker